name: CI/CD Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: haupham2311/be-core-web-cms:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: haupham2311/fe-core-web-cms:latest
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |            
            docker pull haupham2311/be-core-web-cms:latest
            docker stop be-core-web-cms || true
            docker rm be-core-web-cms || true
            
            docker run -d --name be-core-web-cms --restart unless-stopped -p 3066:3001 \
              -e NODE_OPTIONS="--dns-result-order=ipv4first" \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              haupham2311/be-core-web-cms:latest

            
            docker pull haupham2311/fe-core-web-cms:latest
            docker stop fe-core-web-cms || true
            docker rm fe-core-web-cms || true
            
            docker run -d --name fe-core-web-cms --restart unless-stopped -p 3000:3000 \
              haupham2311/fe-core-web-cms:latest

      - name: Gửi thông báo Telegram (deploy xong)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            TEXT="✅ Deploy hoàn tất (branch main)%0A%0ALên hệ thống test nhé 🚀"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${TEXT}" || true
          else
            echo "Skip Telegram notification (TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set)"
          fi